name: Daily Kirishima News Update

on:
  schedule:
    - cron: '0 21 * * *'   # 毎日 6:00 AM JST
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r scripts/requirements.txt

      - name: Run scraper → data/news.json
        run: python scripts/scrape_kirishima.py

      - name: Commit and push news.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/news.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update news data $(date +'%Y-%m-%d')"
            git push
          fi
