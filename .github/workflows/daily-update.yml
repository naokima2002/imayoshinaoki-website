name: Daily Kirishima Info Update

on:
  schedule:
    # 毎日 6:00 AM JST (= UTC 21:00 前日)
    - cron: '0 21 * * *'
  workflow_dispatch:
    # 手動実行も可能（GitHub UI の「Run workflow」ボタン）
    inputs:
      dry_run:
        description: 'Dry run (collect only, no WP post)'
        required: false
        default: 'false'
        type: boolean

jobs:
  update:
    name: Collect & Post Kirishima Info
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'scripts/requirements.txt'

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run scraper (dry-run)
        if: ${{ github.event.inputs.dry_run == 'true' }}
        run: python scripts/scrape_kirishima.py --dry-run
        env:
          WP_URL: ${{ secrets.WP_URL }}
          WP_USER: ${{ secrets.WP_USER }}
          WP_APP_PASS: ${{ secrets.WP_APP_PASS }}

      - name: Run scraper (post to WordPress)
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: python scripts/scrape_kirishima.py
        env:
          WP_URL: ${{ secrets.WP_URL }}
          WP_USER: ${{ secrets.WP_USER }}
          WP_APP_PASS: ${{ secrets.WP_APP_PASS }}

      - name: Commit updated state file
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Actions"
          git add scripts/state.json || true
          git diff --staged --quiet || git commit -m "chore: update scraper state [skip ci]"
          git push || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
