name: Daily Kirishima News Update

on:
  schedule:
    # Every day at 6:00 AM JST (9:00 PM UTC previous day)
    - cron: '0 21 * * *'
  
  # Allow manual trigger
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      # Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v4
      
      # Setup Python
      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      # Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/requirements.txt
      
      # Run scraper
      - name: Run Kirishima News Scraper
        run: |
          python scripts/scrape_kirishima.py
      
      # Post to WordPress
      - name: Post to WordPress
        run: |
          python scripts/post_to_wordpress.py
        env:
          WP_URL: ${{ secrets.WP_URL }}
          WP_USER: ${{ secrets.WP_USER }}
          WP_APP_PASS: ${{ secrets.WP_APP_PASS }}
      
      # Notify on success
      - name: Success notification
        if: success()
        run: |
          echo "✓ Daily update completed successfully"
          echo "Time: $(date)"
      
      # Notify on failure
      - name: Failure notification
        if: failure()
        run: |
          echo "✗ Daily update failed"
          echo "Time: $(date)"
          exit 1

# Notifications (optional)
# You can add Slack or Discord notifications here if needed
